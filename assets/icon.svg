<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#5B3FD6"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Magnifying glass (search/BM25) -->
  <!-- Glass circle -->
  <circle cx="112" cy="95" r="38" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Glass handle -->
  <line x1="140" y1="123" x2="168" y2="151" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Search lines inside the glass -->
  <line x1="90" y1="82" x2="134" y2="82" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="90" y1="95" x2="125" y2="95" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="90" y1="108" x2="118" y2="108" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- Yellow "BM25" badge -->
  <rect x="140" y="52" rx="6" ry="6" width="52" height="22" fill="#F5A623"/>
  <text x="166" y="68" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">BM25</text>

  <!-- Text: ParadeDB -->
  <text x="128" y="200" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">ParadeDB</text>

  <!-- Text: EF Core -->
  <text x="128" y="226" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.85">EF Core</text>
</svg>
