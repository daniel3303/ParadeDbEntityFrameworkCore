name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Restore
        run: dotnet restore

      - name: Build (warnings as errors)
        run: dotnet build -c Release --no-restore -warnaserror

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [net8.0, net9.0, net10.0]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (${{ matrix.framework }})
        run: dotnet build -c Release --no-restore --framework ${{ matrix.framework }}

      - name: Test (${{ matrix.framework }})
        run: dotnet test -c Release --no-build --framework ${{ matrix.framework }} --collect:"XPlat Code Coverage"

      - name: Upload coverage to Codecov
        if: matrix.framework == 'net10.0'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/TestResults/**/coverage.cobertura.xml'
